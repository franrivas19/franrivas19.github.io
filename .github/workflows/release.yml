name: Crear Release

on:
  push:
    tags:
      - 'v*' # Activa el workflow cuando se hace push de un tag v1.0, v2.1.2, etc.

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Guardar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: scarpa-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build_ios:
    name: Build iOS app
    runs-on: macos-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar iOS (sin firma)
        run: |
          set -e
          flutter build ipa --release --no-codesign || true

          if ls build/ios/ipa/*.ipa 1> /dev/null 2>&1; then
            echo "IPA encontrada"
          else
            echo "No se generó .ipa; creando paquete .app en zip"
            flutter build ios --release --no-codesign
            cd build/ios/iphoneos
            zip -r scarpa-ios-app.zip Runner.app
          fi

      - name: Guardar build iOS como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: scarpa-ios-build
          path: |
            build/ios/ipa/*.ipa
            build/ios/iphoneos/scarpa-ios-app.zip
          if-no-files-found: error

  release:
    name: Publicar Release
    needs:
      - build_android
      - build_ios
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para crear la release
    steps:
      - name: Descargar artefactos Android
        uses: actions/download-artifact@v4
        with:
          name: scarpa-android-apk
          path: dist/android

      - name: Descargar artefactos iOS
        uses: actions/download-artifact@v4
        with:
          name: scarpa-ios-build
          path: dist/ios

      - name: Crear release y adjuntar artefactos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Cambios en esta versión:
            - APK Android
            - Build iOS (IPA sin firma o ZIP de la app)
          draft: false
          prerelease: false
          files: |
            dist/android/**/*.apk
            dist/ios/**/*.ipa
            dist/ios/**/*.zip
