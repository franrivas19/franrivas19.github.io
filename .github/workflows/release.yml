name: Crear Release

on:
  push:
    tags:
      - 'v*' # Activa el workflow cuando se hace push de un tag v1.0, v2.1.2, etc.

jobs:
  build_android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar APK release
        run: flutter build apk --release

      - name: Guardar APK como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: scarpa-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  build_web:
    name: Build Web version
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Configurar Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Instalar dependencias
        run: flutter pub get

      - name: Compilar versión web
        run: flutter build web --release

      - name: Copiar contenido web a docs/app
        run: |
          rm -rf docs/app/*
          cp -r build/web/* docs/app/

      - name: Guardar build web como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: scarpa-web-build
          path: docs/app/
          if-no-files-found: error

  release:
    name: Publicar Release
    needs:
      - build_android
      - build_web
    runs-on: ubuntu-latest
    permissions:
      contents: write # Necesario para crear la release
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4

      - name: Descargar artefactos Android
        uses: actions/download-artifact@v4
        with:
          name: scarpa-android-apk
          path: dist/android

      - name: Descargar build web
        uses: actions/download-artifact@v4
        with:
          name: scarpa-web-build
          path: docs/app

      - name: Crear release y adjuntar artefactos
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Release ${{ github.ref_name }}
          body: |
            Cambios en esta versión:
            - APK Android
            - Versión web actualizada
          draft: false
          prerelease: false
          files: |
            dist/android/**/*.apk
